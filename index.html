<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Password</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .login-container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        input { padding: 10px; width: 200px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Authorized Access Only</h2>
    <input type="password" id="passwordField" placeholder="Enter Password">
    <br>
    <button onclick="checkPassword()">Enter</button>
</div>

<script>
    function checkPassword() {
        const pass = document.getElementById('passwordField').value;
        if (pass === 'shuttleiscool') {
            window.location.href = 'list.html';
        } else {
            alert('Incorrect password. Access denied.');
        }
    }
    // Allow pressing "Enter" key to submit
    document.getElementById('passwordField').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') { checkPassword(); }
    });
</script>

</body>
</html>
